apiVersion: v1
kind: Pod
metadata:
  name: xid-dcgmi-inject
spec:
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  containers:
    - name: inject
      image: public.ecr.aws/amazonlinux/amazonlinux:2023
      env:
        - name: XID_CODE
          value: "79"
        - name: GPU_ID
          value: "0"
      command: ["/bin/bash", "-c"]
      args:
        - |
          echo "=== DCGM XID Injection ==="
          echo "Injects XID error directly into DCGM cache (field 230)"
          echo "This triggers the eks-node-monitoring-agent policy violation channel"
          echo ""
          echo "Reference: https://github.com/jicowan/hma-cli"
          echo "Docs: https://docs.aws.amazon.com/eks/latest/userguide/node-health-nma.html"
          echo ""
          echo "XID Code: ${XID_CODE} | GPU: ${GPU_ID}"
          echo ""
          echo "To inject, run this from your workstation:"
          echo ""
          echo "  DCGM_POD=\$(kubectl get pods -n kube-system -l k8s-app=dcgm-server -o jsonpath='{.items[0].metadata.name}')"
          echo "  kubectl exec -n kube-system \$DCGM_POD -- dcgmi test --inject --gpuid ${GPU_ID} -f 230 -v ${XID_CODE}"
          echo ""
          echo "Expected for XID ${XID_CODE}:"
          case ${XID_CODE} in
            46|48|54|62|63|95|109|110|136|140|143|155|156|158)
              echo "  NvidiaXID${XID_CODE}Error → AcceleratedHardwareReady=False → Reboot"
              ;;
            64|74|79|119|120|142|151)
              echo "  NvidiaXID${XID_CODE}Error → AcceleratedHardwareReady=False → Replace"
              ;;
            *)
              echo "  NvidiaXID${XID_CODE}Warning → Event only (non-critical)"
              ;;
          esac
          echo ""
          echo "Verify:"
          echo "  kubectl get events -A | grep NvidiaXID"
          echo "  kubectl describe node <gpu-node> | grep -A3 AcceleratedHardwareReady"
  restartPolicy: Never
