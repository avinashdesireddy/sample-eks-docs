apiVersion: v1
kind: Pod
metadata:
  name: xid-cuda-fault
spec:
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  containers:
    - name: fault
      image: nvcr.io/nvidia/cuda:12.6.3-devel-ubuntu22.04
      resources:
        limits:
          nvidia.com/gpu: "1"
      command: ["/bin/bash", "-c"]
      args:
        - |
          echo "=== CUDA Fault Injection ==="
          echo "Triggers a GPU fault detected by DCGM → eks-node-monitoring-agent"
          echo ""

          cat > /tmp/fault.cu << 'EOF'
          #include <stdio.h>
          #include <cuda_runtime.h>

          __global__ void illegal_access() {
              int *ptr = (int *)0xDEADBEEF;
              *ptr = 42;
          }

          int main() {
              printf("Launching kernel with illegal memory access...\n");
              illegal_access<<<1, 1>>>();
              cudaError_t err = cudaDeviceSynchronize();
              printf("cudaDeviceSynchronize returned: %s (%d)\n",
                     cudaGetErrorString(err), err);
              err = cudaGetLastError();
              printf("cudaGetLastError returned: %s (%d)\n",
                     cudaGetErrorString(err), err);
              return 0;
          }
          EOF

          echo "Compiling..."
          nvcc -o /tmp/fault /tmp/fault.cu 2>&1
          echo "Running fault program..."
          /tmp/fault
          echo ""
          echo "Verify detection:"
          echo "  kubectl get events -A | grep NvidiaXID"
          echo "  kubectl describe node \$(kubectl get pod xid-cuda-fault -o jsonpath='{.spec.nodeName}') | grep -A3 AcceleratedHardwareReady"
  restartPolicy: Never
