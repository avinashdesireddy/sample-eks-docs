apiVersion: v1
kind: Pod
metadata:
  name: journal-check
spec:
  hostPID: true
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  containers:
    - name: check
      image: public.ecr.aws/amazonlinux/amazonlinux:2023
      securityContext:
        privileged: true
      command: ["/bin/bash", "-c"]
      args:
        - |
          dnf install -y systemd >/dev/null 2>&1
          echo "=== which journal dirs exist on host ==="
          ls -la /host-run-log/journal 2>/dev/null || echo "/host-run-log/journal: missing"
          ls -la /host-var-log/journal 2>/dev/null || echo "/host-var-log/journal: missing"
          echo ""
          echo "=== journalctl against /host-var-log/journal (all kernel messages) ==="
          journalctl -D /host-var-log/journal -k --no-pager 2>&1 | grep -iE "nvrm|xid|sxid" | tail -20 || echo "nothing or error"
          echo ""
          echo "=== journalctl against /host-run-log/journal (volatile) ==="
          journalctl -D /host-run-log/journal -k --no-pager 2>&1 | grep -iE "nvrm|xid|sxid" | tail -20 || echo "nothing or error"
          echo ""
          echo "=== dmesg confirmation (most reliable) ==="
          dmesg | grep -iE "nvrm|xid|sxid" | tail -10
          echo ""
          echo "=== /dev/kmsg tail ==="
          timeout 2 cat /dev/kmsg 2>/dev/null | grep -iE "nvrm|xid|sxid" | tail -10 || echo "could not read /dev/kmsg"
      volumeMounts:
        - name: run-log
          mountPath: /host-run-log
          readOnly: true
        - name: var-log
          mountPath: /host-var-log
          readOnly: true
  volumes:
    - name: run-log
      hostPath:
        path: /run/log
    - name: var-log
      hostPath:
        path: /var/log
  restartPolicy: Never
